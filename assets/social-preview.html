<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AXIOM Social Preview</title>
    <style>
      :root {
        --bg: #07111f;
        --panel: rgba(10, 20, 36, 0.76);
        --panel-border: rgba(255, 255, 255, 0.12);
        --gold: #f2b84b;
        --ivory: #f7f2e8;
        --mist: #a8bbd5;
        --ice: #7fd5ff;
        --emerald: #6bd6a5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1280px;
        height: 640px;
        overflow: hidden;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        color: var(--ivory);
        background:
          radial-gradient(circle at top left, rgba(127, 213, 255, 0.24), transparent 28%),
          radial-gradient(circle at 82% 18%, rgba(242, 184, 75, 0.20), transparent 22%),
          radial-gradient(circle at 75% 84%, rgba(107, 214, 165, 0.14), transparent 22%),
          linear-gradient(135deg, #050b14 0%, #0b1628 52%, #101d34 100%);
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 52px;
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.34), transparent 78%);
        pointer-events: none;
      }

      .panel {
        position: relative;
        height: 100%;
        padding: 42px 46px 38px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
          var(--panel);
        box-shadow:
          0 30px 90px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(10px);
      }

      .badge {
        display: inline-block;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(242, 184, 75, 0.38);
        color: var(--gold);
        background: rgba(242, 184, 75, 0.08);
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 16px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 28px 0 8px;
        font-size: 132px;
        line-height: 0.9;
        letter-spacing: 0.05em;
        font-weight: 700;
      }

      .tagline {
        max-width: 700px;
        margin: 0;
        color: var(--mist);
        font-size: 35px;
        line-height: 1.18;
      }

      .rule {
        width: 180px;
        height: 4px;
        margin: 28px 0 22px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--gold), rgba(242, 184, 75, 0));
      }

      .pillars {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-width: 700px;
      }

      .pillar {
        padding: 12px 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 17px;
        color: #d6e2f0;
      }

      .pillar strong {
        color: var(--ice);
        font-weight: 600;
      }

      .side-note {
        position: absolute;
        right: 46px;
        bottom: 38px;
        width: 280px;
        padding: 20px 22px;
        border-radius: 18px;
        border: 1px solid rgba(107, 214, 165, 0.22);
        background: rgba(8, 23, 20, 0.34);
      }

      .side-note .label {
        margin: 0 0 10px;
        color: var(--emerald);
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .side-note p {
        margin: 0;
        color: #dce8df;
        font-size: 24px;
        line-height: 1.18;
      }

      .corner {
        position: absolute;
        top: 44px;
        right: 44px;
        width: 170px;
        height: 170px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent),
          linear-gradient(135deg, rgba(127, 213, 255, 0.14), rgba(242, 184, 75, 0.08));
        transform: rotate(14deg);
      }

      .corner::after {
        content: "";
        position: absolute;
        inset: 18px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="grid"></div>
      <div class="panel">
        <div class="badge">Agent-Native Systems Language</div>
        <div class="corner"></div>
        <h1>AXIOM</h1>
        <p class="tagline">Specification for structural program synthesis, explicit effects, safe low-level semantics, and deterministic native compilation.</p>
        <div class="rule"></div>
        <div class="pillars">
          <div class="pillar"><strong>Canonical</strong> typed program graph</div>
          <div class="pillar"><strong>Patch-first</strong> program transformation</div>
        </div>
        <div class="side-note">
          <p class="label">Status</p>
          <p>Specification and planning phase<br>Phase 0 → Phase 1</p>
        </div>
      </div>
    </div>
  </body>
</html>
